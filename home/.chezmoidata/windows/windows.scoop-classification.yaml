# windows.scoop-classification.yaml

# 作用：
#   这是 Scoop 分类“源文件”，按“组 -> bucket -> 包名”维护。
#   run_onchange_after_convert-scoop-export.ps1.tmpl 会读取它，
#   再结合 `scoop export` 的结果生成 manifests/windows.packages.json。

# 顶层结构：
#   scoopClassification:
#     schemaVersion: 版本号，当前固定为 1
#     matchKeyFormat: 匹配键格式，固定使用 "bucketAlias/packageName"
#     defaults: 默认值
#     groups:    分组定义（主要维护这里）
#     packageOverrides: 单个包的例外覆盖（尽量少用）

# defaults 字段：
#   fallbackGroup:    未命中任何分组规则时，自动归入哪个组
#   selection:        组的默认选择策略
#                     - required : 必装，不给安装器跳过
#                     - default  : 默认选中，但安装器可取消
#                     - optional : 默认不选
#   installPriority:  默认安装优先级，数字越小越早安装
#   requiresAdmin:    默认是否需要管理员权限
#   installMode:      默认安装模式
#                     - auto   : 正常自动安装
#                     - manual : 仅导出到清单，但安装时建议手动处理
#                     - skip   : 导出时直接跳过

# groups 字段：
#   每个 group 表示一个“安装组”，后续 bootstrap 应按 group 维度给用户选择。

# group 可配置字段：
#   title:
#     显示名称。

#   description:
#     说明文字，用于安装器展示或后续维护说明。

#   selection:
#     组级选择策略：
#       - required : 必装，不给安装器跳过
#       - default  : 默认选中，但安装器可取消
#       - optional : 默认不选

#   promptOrder:
#     安装器里显示顺序，数字越小越靠前。

#   installPriority:
#     该组的默认安装顺序，数字越小越早。
#     组内单个包如果没有 override.installPriority，就继承这里。

#   ui:
#     可选。组的界面形态元数据：
#       - cli
#       - gui
#       - hybrid
#     只是元数据，不直接决定安装逻辑。

#   domain:
#     可选。组的功能域元数据，例如：
#       - terminal
#       - editor
#       - network
#       - media
#       - input
#       - office
#     只是元数据，不直接决定安装逻辑。

#   buckets:
#     组内真正维护的软件清单，按 bucket alias 聚合：
#       buckets:
#         main:
#           - git
#           - pwsh
#         abyss:
#           - Microsoft.VisualStudioCode

# buckets 写法：
#   buckets:
#     main:
#       - git
#       - pwsh
#     abyss:
#       - Microsoft.VisualStudioCode

# 注意：
#   1. bucket 名必须写“实际 alias”，不是仓库 repo 名。
#      例如你执行的是：
#        scoop bucket add abyss https://github.com/abgox/abyss
#      那这里就必须写：
#        abyss:
#          - 某包名

#   2. 同组内请按 bucket 聚合，不要写平铺 package 列表。

#   3. 如果一个包只是临时不确定归属，不要乱放到别组，先放 fallbackGroup。

# packageOverrides 字段：
#   用于少量“例外”配置，避免把每个包都写得很重。
#   只有当某个包的行为需要偏离所在 group 的默认设置时，才建议在这里写覆盖。

# packageOverrides 写法：
#   packageOverrides:
#     main:
#       git:
#         installPriority: 30
#     extras:
#       archwsl:
#         requiresAdmin: true
#         installMode: manual

# packageOverrides 可配置字段：
#   selection:
#     覆盖组内该包的选择策略：
#       - required : 组选中后，该包必须安装
#       - default  : 组选中后，该包默认安装
#       - optional : 组选中后，该包仍然是组内可选项

#   installPriority:
#     覆盖该包的安装优先级。
#     数字越小越早安装；如果不写，则继承所在 group 的 installPriority，
#     再不写则继承 defaults.installPriority。

#   requiresAdmin:
#     是否需要管理员权限。
#     true  表示该包安装时需要管理员权限或建议在管理员上下文处理；
#     false 表示不需要。

#   installMode:
#     覆盖该包的安装模式：
#       - auto   : 正常自动安装
#       - manual : 导出到清单，但安装时建议手动处理
#       - skip   : 导出时直接跳过该包

#   ui:
#     覆盖该包的界面形态元数据：
#       - cli
#       - gui
#       - hybrid
#     这是元数据，不直接决定安装逻辑。

#   domain:
#     覆盖该包的功能域元数据，例如：
#       - terminal
#       - editor
#       - network
#       - media
#       - input
#       - office
#     这也是元数据，不直接决定安装逻辑。

#   notes:
#     备注说明，用于记录特殊安装方式、依赖关系、许可证限制、
#     下载来源限制等信息。

# 说明：
#   group.selection 决定“组是否参与安装”
#   packageOverrides.<bucket>.<pkg>.selection 决定“组内该包是否继续可选”

# 适合放在 override 的情况：
#   - 某个包需要更早/更晚安装
#   - 某个包需要管理员权限
#   - 某个包建议手动安装
#   - 某个包需要在组选中后继续保持 optional
#   - 某个包需要补 notes/ui/domain 等元数据

# 不建议放在 override 的情况：
#   - 只是单纯想换组
#   - 只是想把包加入某个分类
#   这类情况应优先改 groups，而不是在 override 里兜底。

# 新建分组步骤：
#   1. 在 groups 下新增一个组 id（建议 kebab-case）
#   2. 设置 title / description
#   3. 设置 selection / promptOrder / installPriority
#   4. 在 buckets 下按 bucket alias 填入包名
#   5. 仅在少数特殊包需要例外时，再去 packageOverrides 写覆盖
#
# 优先级建议：
#   1xx  : 基础引导 / 必需 CLI
#   2xx  : 常用 CLI / 核心工作流
#   3xx  : GUI 工具 / 桌面应用
#   9xx  : 未分类 / 实验性
#
# 维护原则：
#   - 优先改 groups，不要优先改 packageOverrides
#   - 让分类文件保持“按组维护”，不要退回“按包平铺维护”
#   - packageOverrides 只保留少量例外

scoopClassification:
  schemaVersion: 1
  matchKeyFormat: bucketAlias/packageName

  defaults:
    fallbackGroup: misc-lab
    selection: optional
    installPriority: 500
    requiresAdmin: false
    installMode: auto

  groups:
    bootstrap-core-cli:
      title: 基础引导 CLI
      description: Scoop 后续安装链路必需的基础命令行工具
      selection: required
      promptOrder: 10
      installPriority: 10
      buckets:
        main:
          - 7zip
          - aria2
          - git
          - pwsh

    core-cli-utils:
      title: 核心 CLI 工具
      description: 日常必备的命令行基础工具
      selection: default
      promptOrder: 20
      installPriority: 20
      buckets:
        main:
          - atuin
          - curl
          - duckdb
          - fd
          - gsudo
          - iconv
          - innounp
          - jid
          - jq
          - less
          - nircmd
          - ripgrep
          - unzip
          - yazi
          - zoxide
        abyss:
          - eza-community.eza
          - itchyny.gojq
          - sharkdp.bat
          - pamburus.hl

    shell-workflow-cli:
      title: Shell 工作流 CLI
      description: Shell、Chezmoi、Scoop 等工作流增强工具
      selection: default
      promptOrder: 30
      installPriority: 30
      buckets:
        main:
          - direnv
          - scoop-search
        extras:
          - sfsu
        abyss:
          - abgox.PSCompletions
          - abgox.scoop-i18n
          - Cishoon.md
          - twpayne.chezmoi
          - Nushell.Nushell
        margin:
          - kd

    git-devtools-cli:
      title: Git 工作流 CLI
      description: Git 与代码托管相关命令行工具
      selection: default
      promptOrder: 40
      installPriority: 40
      buckets:
        main:
          - git-filter-repo
        abyss:
          - GitHub.cli
          - dinoDanic.diny
        extras:
          - lazygit

    build-runtime-cli:
      title: 构建与运行时 CLI
      description: 编译链、语言运行时与格式化工具
      selection: default
      promptOrder: 50
      installPriority: 50
      buckets:
        main:
          - cargo-binstall
