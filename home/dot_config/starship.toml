[username]
style_user = 'bold os'
style_root = 'bold os_admin'
format = '[оГП $user](fg:$style) '
disabled = false
show_always = true

[os]
format = "on [$symbol$name]($style) "
style = "bold blue"
disabled = false

[os.symbols]
Alpine = "пМА "
Arch = "пМГ "
Debian = "пМЖ "
EndeavourOS = "пЖЧ "
Fedora = "пМК "
Linux = "пМЪ "
Macos = "пМВ "
Manjaro = "пМТ "
Mint = "пМО "
NixOS = "пМУ "
openSUSE = "пМФ "
Pop = "оК£ "
SUSE = "пМФ "
Ubuntu = "пМЫ "
Windows = "пЕЇ "

[character]
success_symbol = "[у∞НЯ](fg:arrow)"
error_symbol = "[у∞НЯ](fg:red)"

[directory]
format = "[$path](bold $style)[$read_only]($read_only_style) "
# жШЊз§ЇеЃМжХіиЈѓеЊД
truncation_length = 0
style = "fg:directory"
read_only_style = "fg:directory"
before_repo_root_style = "fg:directory"
truncation_symbol = "вА¶/"
# еЬ® git дїУеЇУдЄ≠жШЊз§ЇеЃМжХізЪДзїЭеѓєиЈѓеЊД
truncate_to_repo = false
read_only = " о©µ "

[time]
disabled = true
format = "at [у±СИ $time]($style)"
time_format = "%H:%M"
style = "bold fg:time"

[cmd_duration]
format = "took [пУ£ $duration]($style) "
style = "bold fg:duration"
min_time = 500

[git_branch]
format = "via [$symbol$branch]($style) "
style = "bold fg:git"
symbol = "оЬВ "

[git_status]
format = '[ $all_status$ahead_behind ]($style)'
style = "fg:text_color bg:git"
disabled = true

[docker_context]
disabled = true
symbol = "пМИ "

[package]
disabled = true

[fill]
symbol = " "

[nodejs]
format = "[ $symbol$version ]($style)"
style = "bg:node fg:text_light"
symbol = "оЬШ "
version_format = "${raw}"
disabled = false

[python]
disabled = false
format = '[ ${symbol}${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = "оШЖ "
version_format = "${raw}"
style = "bg:python fg:text_light"

[conda]
format = "[ $symbol$environment ]($style)"
style = "bg:conda fg:text_light"
ignore_base = false
disabled = false
symbol = "пДМ "

[java]
format = "[ $symbol$version ]($style)"
style = "bg:java fg:text_light"
version_format = "${raw}"
symbol = "оЩ≠ "
disabled = true

[c]
format = "[ $symbol($version(-$name)) ]($style)"
style = "bg:clang fg:text_light"
symbol = "оШЮ "
version_format = "${raw}"
disabled = true

[rust]
format = "[ $symbol$version ]($style)"
style = "bg:rust fg:text_light"
symbol = "оЪЛ "
version_format = "${raw}"
disabled = true
