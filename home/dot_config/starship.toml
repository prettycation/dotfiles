[username]
style_user = 'bold os'
style_root = 'bold os_admin'
format = '[$user](fg:$style) '
disabled = false
show_always = true

[os]
format = "[$symbol]($style)"
style = "bold os"
disabled = false

[os.symbols]
Alpine = "пҢҖ "
Arch = "пҢғ "
Debian = "пҢҶ "
EndeavourOS = "пҶ— "
Fedora = "пҢҠ "
Linux = "пҢҡ "
Macos = "пҢӮ "
Manjaro = "пҢ’ "
Mint = "пҢҺ "
NixOS = "пҢ“ "
openSUSE = "пҢ” "
Pop = "оҠЈ "
SUSE = "пҢ” "
Ubuntu = "пҢӣ "
Windows = "п…ә "

[character]
success_symbol = "[у°Қҹ](fg:arrow)"
error_symbol = "[у°Қҹ](fg:red)"

[directory]
format = "[$path](bold $style)[$read_only]($read_only_style) "
# жҳҫзӨәе®Ңж•ҙи·Ҝеҫ„
truncation_length = 0
style = "fg:directory"
read_only_style = "fg:directory"
before_repo_root_style = "fg:directory"
truncation_symbol = "вҖҰ/"
# еңЁ git д»“еә“дёӯжҳҫзӨәе®Ңж•ҙзҡ„з»қеҜ№и·Ҝеҫ„
truncate_to_repo = false
read_only = " о©ө "

[time]
disabled = true
format = "at [уұ‘Ҳ $time]($style)"
time_format = "%H:%M"
style = "bold fg:time"

[cmd_duration]
format = "took [п“Ј $duration]($style) "
style = "bold fg:duration"
min_time = 500

[git_branch]
format = "via [$symbol$branch]($style) "
style = "bold fg:git"
symbol = "оңӮ "

[git_status]
format = '[ $all_status$ahead_behind ]($style)'
style = "fg:text_color bg:git"
disabled = true

[docker_context]
disabled = true
symbol = "пҢҲ "

[package]
disabled = true

[fill]
symbol = " "

[nodejs]
format = "[ $symbol$version ]($style)"
style = "bg:node fg:text_light"
symbol = "оңҳ "
version_format = "${raw}"
disabled = false

[python]
disabled = false
format = '[ ${symbol}${pyenv_prefix}(${version})( \($virtualenv\)) ]($style)'
symbol = "оҳҶ "
version_format = "${raw}"
style = "bg:python fg:text_light"

[conda]
format = "[ $symbol$environment ]($style)"
style = "bg:conda fg:text_light"
ignore_base = false
disabled = false
symbol = "п„Ң "

[java]
format = "[ $symbol$version ]($style)"
style = "bg:java fg:text_light"
version_format = "${raw}"
symbol = "оҷӯ "
disabled = true

[c]
format = "[ $symbol($version(-$name)) ]($style)"
style = "bg:clang fg:text_light"
symbol = "оҳһ "
version_format = "${raw}"
disabled = true

[rust]
format = "[ $symbol$version ]($style)"
style = "bg:rust fg:text_light"
symbol = "оҡӢ "
version_format = "${raw}"
disabled = true
