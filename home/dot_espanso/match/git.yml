yaml-language-server: $schema=https://raw.githubusercontent.com/espanso/espanso/dev/schemas/match.schema.json
matches:
  - trigger: "g.ck"
    replace: "git checkout "

  - trigger: "g.cm"
    replace: "git commit --amend --no-edit"

  - trigger: "g.cl"
    replace: "git clone "

  - trigger: "g.sw"
    replace: "git switch "

  - trigger: "g.rs"
    replace: "git reset --hard FETCH_HEAD"

  - trigger: "g.ra"
    replace: "git remote add origin $|$"

  - trigger: "g.rmt"
    replace: "git remote add upstream $|$"

  - trigger: "g.rmv"
    replace: " git rm --cached $|$"

  # git push

  - trigger: "g.ps"
    replace: "git push --force-with-lease $|$"

  - trigger: "g.pd"
    replace: "git push upstream --delete feat/"

  - trigger: "g.pu"
    replace: "git push -u upstream feat/"

  - trigger: "g.pl"
    replace: "git pull -X theirs"

  - trigger: "g.fc"
    replace: "git fetch --all"

  - trigger: "g.br"
    replace: "git branch -m feat/"

  # git bisect

  - trigger: "g.bss"
    replace: "git bisect start"

  - trigger: "g.bsr"
    replace: "git bisect reset"

  - trigger: "g.bsg"
    replace: "git bisect good "

  - trigger: "g.bsb"
    replace: "git bisect bad "
