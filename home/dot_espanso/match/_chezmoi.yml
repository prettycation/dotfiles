matches:
  - trigger: "u.dr"
    replace: "chezmoi apply --dry-run --verbose"

  - trigger: "u.ap"
    replace: "chezmoi apply"

  - trigger: "u.in"
    replace: "chezmoi init --source ."

  - trigger: "u.sp"
    replace: "chezmoi source-path"

  - trigger: "u.ad"
    replace: "chezmoi add --template "

  - trigger: "u.mg"
    replace: "chezmoi merge --verbose "

  - trigger: "u.ac"
    replace: '{{ (bitwarden "item" "$|$").login.username}}'

  - trigger: "u.ps"
    replace: '{{ (bitwarden "item" "$|$").login.password}}'

  - trigger: "u.dl"
    replace: '# chezmoi:template:left-delimiter="[[", right-delimiter="]]"'

  - trigger: "u.dc"
    replace: "chezmoi doctor"

  - trigger: "u.da"
    replace: "{{ .$|$ | quote  }}"

  - trigger: "u.if"
    replace: |
      \{\{- if (hasKey . "{{f.v}}") \}\}
      \{\{-   if .{{f.v}} \}\}
      $|$
      \{\{-   end \}\}
      \{\{- end \}\}
    vars:
      - name: f
        type: form
        params:
          layout: "Variable Name: [[v]]"

  - trigger: "u.osw"
    replace: '{{- if eq .chezmoi.os "windows" }}'

  - trigger: "u.osl"
    replace: '{{- if eq .chezmoi.os "linux" }}'

  - trigger: "u.osd"
    replace: '{{- if eq .chezmoi.os "darwin" }}'

  - trigger: "u.ed"
    replace: "{{- end }}"
