name: Sync WezTerm config upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "43 18 * * 6"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-wezterm-config
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dotfiles
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read last synced upstream commit
        id: base
        run: |
          if [ ! -f .github/sync/wezterm-config-upstream-sha ]; then
            echo "::error::.github/sync/wezterm-config-upstream-sha does not exist"
            exit 1
          fi

          BASE_SHA="$(cat .github/sync/wezterm-config-upstream-sha | tr -d '[:space:]')"

          if [ -z "$BASE_SHA" ]; then
            echo "::error::sync marker is empty"
            exit 1
          fi

          echo "sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "Base upstream SHA: $BASE_SHA"

      - name: Read latest upstream commit
        id: upstream
        run: |
          UPSTREAM_SHA="$(git ls-remote https://github.com/KevinSilvester/wezterm-config.git refs/heads/master | cut -f1)"

          if [ -z "$UPSTREAM_SHA" ]; then
            echo "::error::failed to read upstream master SHA"
            exit 1
          fi

          echo "sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "short=${UPSTREAM_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "Latest upstream SHA: $UPSTREAM_SHA"

      - name: Stop if already synced
        if: steps.base.outputs.sha == steps.upstream.outputs.sha
        run: |
          echo "Already synced."
          echo "Current marker: ${{ steps.base.outputs.sha }}"
          echo "Upstream head:   ${{ steps.upstream.outputs.sha }}"

      - name: Prepare sync branch
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          git switch -c sync/wezterm-config-upstream

      - name: Download upstream commit patches
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          mkdir -p /tmp/wezterm-config-patches

          curl -L \
            "https://api.github.com/repos/KevinSilvester/wezterm-config/compare/${{ steps.base.outputs.sha }}...${{ steps.upstream.outputs.sha }}" \
            -o /tmp/wezterm-config-compare.json

          jq -r '.commits[].sha' /tmp/wezterm-config-compare.json > /tmp/wezterm-config-commits.txt

          if [ ! -s /tmp/wezterm-config-commits.txt ]; then
            echo "::error::no upstream commits found in compare range"
            exit 1
          fi

          n=1
          while read -r sha; do
            file="$(printf "/tmp/wezterm-config-patches/%04d-%s.patch" "$n" "$sha")"
            curl -L "https://github.com/KevinSilvester/wezterm-config/commit/${sha}.patch" -o "$file"
            echo "$file"
            n=$((n + 1))
          done < /tmp/wezterm-config-commits.txt

      - name: Apply upstream patches
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        id: apply
        continue-on-error: true
        run: |
          set +e

          mkdir -p .github/sync/wezterm-config-patches
          rm -f .github/sync/wezterm-config-patches/*.patch

          failed=0
          failed_patch=""

          for patch in /tmp/wezterm-config-patches/*.patch; do
            echo "Applying patch with git am --3way: $patch"

            git am \
              --3way \
              --empty=drop \
              --exclude="backdrops/**" \
              --exclude="home/dot_config/wezterm/backdrops/**" \
              --directory=home/dot_config/wezterm \
              "$patch"

            status=$?

            if [ "$status" -eq 0 ]; then
              continue
            fi

            echo "::warning::git am --3way failed for $patch"
            echo "Trying fallback with git apply --reject."

            git apply \
              --reject \
              --exclude="backdrops/**" \
              --exclude="home/dot_config/wezterm/backdrops/**" \
              --directory=home/dot_config/wezterm \
              .git/rebase-apply/patch

            apply_status=$?

            reject_files="$(find home/dot_config/wezterm -name '*.rej' -print)"

            if [ "$apply_status" -eq 0 ] && [ -z "$reject_files" ]; then
              echo "Fallback apply succeeded cleanly."

              git add home/dot_config/wezterm
              git am --continue

              continue_status=$?

              if [ "$continue_status" -eq 0 ]; then
                echo "git am --continue succeeded after fallback."
                continue
              fi

              echo "::warning::git am --continue failed after fallback."
            else
              echo "::warning::Fallback apply did not finish cleanly."
              if [ -n "$reject_files" ]; then
                echo "Reject files:"
                echo "$reject_files"
              fi
            fi

            failed=1
            failed_patch="$patch"

            git am --abort || true
            git reset --hard HEAD
            find home/dot_config/wezterm -name '*.rej' -delete

            cp "$patch" .github/sync/wezterm-config-patches/

            found_current=0
            for remaining in /tmp/wezterm-config-patches/*.patch; do
              if [ "$remaining" = "$patch" ]; then
                found_current=1
                continue
              fi

              if [ "$found_current" -eq 1 ]; then
                cp "$remaining" .github/sync/wezterm-config-patches/
              fi
            done

            break
          done

          if [ "$failed" -eq 1 ]; then
            git add .github/sync/wezterm-config-patches
            git commit -m "chore: record remaining wezterm upstream patches"

            echo "result=failed" >> "$GITHUB_OUTPUT"
            echo "failed_patch=$(basename "$failed_patch")" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "result=success" >> "$GITHUB_OUTPUT"

      - name: Update upstream sync marker
        if: steps.base.outputs.sha != steps.upstream.outputs.sha && steps.apply.outputs.result == 'success'
        run: |
          mkdir -p .github/sync
          echo "${{ steps.upstream.outputs.sha }}" > .github/sync/wezterm-config-upstream-sha

          git add .github/sync/wezterm-config-upstream-sha
          git commit -m "chore: update wezterm config upstream sync marker"

      - name: Show resulting status
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          echo "Git status:"
          git status --short

          echo ""
          echo "Recent commits:"
          git log --oneline --decorate -20

          echo ""
          echo "Changed files in this sync:"
          git diff --name-only "${{ github.sha }}"..HEAD || true

      - name: Verify backdrops were not changed
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          if git diff --name-only "${{ github.sha }}"..HEAD | grep 'home/dot_config/wezterm/backdrops/'; then
            echo "::error::backdrops files were committed, but they should be excluded"
            exit 1
          fi

          echo "No backdrops changes detected."

      - name: Push sync branch
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          git push --force-with-lease origin HEAD:sync/wezterm-config-upstream

      - name: Write pull request body
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          if [ "${{ steps.apply.outputs.result }}" = "success" ]; then
            cat > /tmp/wezterm-sync-pr-body.md <<'EOF'
          Sync `home/dot_config/wezterm` with upstream `KevinSilvester/wezterm-config`.

          - From: `${{ steps.base.outputs.sha }}`
          - To: `${{ steps.upstream.outputs.sha }}`
          - Excluded: `backdrops/**`
          - Status: automated sync completed successfully

          This PR was generated automatically by the WezTerm upstream sync workflow.
          EOF
          else
            cat > /tmp/wezterm-sync-pr-body.md <<'EOF'
          Sync `home/dot_config/wezterm` with upstream `KevinSilvester/wezterm-config`.

          - From: `${{ steps.base.outputs.sha }}`
          - To: `${{ steps.upstream.outputs.sha }}`
          - Excluded: `backdrops/**`
          - Status: manual conflict resolution required

          The workflow applied all patches it could, including a fallback attempt for patches where `git am --3way` failed.

          Remaining patch files are stored under `.github/sync/wezterm-config-patches/`.

          See the bot comment below for local takeover instructions.
          EOF
          fi

      - name: Create or update pull request
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="$(gh pr list \
            --head sync/wezterm-config-upstream \
            --base "${{ github.ref_name }}" \
            --json number \
            --jq '.[0].number')"

          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --title "Sync WezTerm config with upstream" \
              --body-file /tmp/wezterm-sync-pr-body.md \
              --add-label automated \
              --add-label wezterm

            echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          else
            pr_url="$(gh pr create \
              --base "${{ github.ref_name }}" \
              --head sync/wezterm-config-upstream \
              --title "Sync WezTerm config with upstream" \
              --body-file /tmp/wezterm-sync-pr-body.md \
              --label automated \
              --label wezterm)"

            echo "Created PR: $pr_url"

            pr_number="$(gh pr view "$pr_url" --json number --jq '.number')"
            echo "number=$pr_number" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment local takeover instructions
        if: steps.base.outputs.sha != steps.upstream.outputs.sha && steps.apply.outputs.result == 'failed'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > /tmp/wezterm-sync-takeover-comment.md <<'EOF'
          ## Manual conflict resolution required

          The workflow could not apply the full upstream patch series automatically.

          It already tried:

          - `git am --3way`
          - fallback with `git apply --reject`

          The PR branch contains:

          - upstream commits that were applied successfully
          - remaining patch files under `.github/sync/wezterm-config-patches/`

          Failed patch:

          ```text
          ${{ steps.apply.outputs.failed_patch }}
          ```

          To take over locally:

          ```bash
          cd ~/.local/share/chezmoi
          git fetch origin sync/wezterm-config-upstream
          git switch sync/wezterm-config-upstream
          ```

          Continue applying the remaining patches:

          ```bash
          git am --3way --empty=drop --exclude="backdrops/**" --exclude="home/dot_config/wezterm/backdrops/**" --directory=home/dot_config/wezterm .github/sync/wezterm-config-patches/*.patch
          ```

          If Git creates merge conflicts, resolve them with your configured merge tool:

          ```bash
          git mergetool
          ```

          Then stage resolved files and continue the patch application:

          ```bash
          git status
          git add home/dot_config/wezterm
          git am --continue
          ```

          If `git mergetool` says `No files need merging`, inspect the current patch and apply it manually:

          ```bash
          git am --show-current-patch=diff
          ```

          After editing the affected files manually:

          ```bash
          git add home/dot_config/wezterm
          git am --continue
          ```

          Repeat until all patches are applied.

          After all patches are applied, update the upstream sync marker:

          ```bash
          echo ${{ steps.upstream.outputs.sha }} > .github/sync/wezterm-config-upstream-sha
          ```

          Remove the temporary patch files:

          ```bash
          git rm -r .github/sync/wezterm-config-patches
          ```

          Commit and push back to this PR branch:

          ```bash
          git add .github/sync/wezterm-config-upstream-sha
          git commit -m "chore: finish wezterm config upstream sync"
          git push
          ```

          EOF

          gh pr comment "${{ steps.pr.outputs.number }}" \
            --edit-last \
            --create-if-none \
            --body-file /tmp/wezterm-sync-takeover-comment.md
