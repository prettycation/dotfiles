name: Test sync WezTerm config upstream

on:
  workflow_dispatch:
  push:
    branches:
      - test/sync-wezterm-workflow

permissions:
  contents: read

concurrency:
  group: test-sync-wezterm-config
  cancel-in-progress: true

jobs:
  test-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dotfiles
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read last synced upstream commit
        id: base
        run: |
          if [ ! -f .github/sync/wezterm-config-upstream-sha ]; then
            echo "::error::.github/sync/wezterm-config-upstream-sha does not exist"
            exit 1
          fi

          BASE_SHA="$(cat .github/sync/wezterm-config-upstream-sha | tr -d '[:space:]')"

          if [ -z "$BASE_SHA" ]; then
            echo "::error::sync marker is empty"
            exit 1
          fi

          echo "sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "Base upstream SHA: $BASE_SHA"

      - name: Read latest upstream commit
        id: upstream
        run: |
          UPSTREAM_SHA="$(git ls-remote https://github.com/KevinSilvester/wezterm-config.git refs/heads/master | cut -f1)"

          if [ -z "$UPSTREAM_SHA" ]; then
            echo "::error::failed to read upstream master SHA"
            exit 1
          fi

          echo "sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "Latest upstream SHA: $UPSTREAM_SHA"

      - name: Stop if already synced
        if: steps.base.outputs.sha == steps.upstream.outputs.sha
        run: |
          echo "Already synced."
          echo "Current marker: ${{ steps.base.outputs.sha }}"
          echo "Upstream head:   ${{ steps.upstream.outputs.sha }}"

      - name: Download upstream patch series
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          curl -L \
            "https://github.com/KevinSilvester/wezterm-config/compare/${{ steps.base.outputs.sha }}...${{ steps.upstream.outputs.sha }}.patch" \
            -o /tmp/wezterm-config.patch

          echo "Downloaded patch:"
          ls -lh /tmp/wezterm-config.patch

      - name: Show patch file list
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          echo "Files touched by upstream patch:"
          grep '^diff --git ' /tmp/wezterm-config.patch || true

          echo ""
          echo "Backdrops entries, if any:"
          grep 'backdrops/' /tmp/wezterm-config.patch || true

      - name: Apply upstream patches into chezmoi wezterm directory
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          git am \
            --3way \
            --empty=drop \
            --exclude="backdrops/**" \
            --exclude="home/dot_config/wezterm/backdrops/**" \
            --directory=home/dot_config/wezterm \
            /tmp/wezterm-config.patch

      - name: Update upstream sync marker
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          mkdir -p .github/sync
          echo "${{ steps.upstream.outputs.sha }}" > .github/sync/wezterm-config-upstream-sha

      - name: Show resulting status
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          echo "Git status:"
          git status --short

          echo ""
          echo "Recent commits:"
          git log --oneline --decorate -20

          echo ""
          echo "Changed files compared with workflow branch base:"
          git diff --name-only HEAD~20..HEAD || true

          echo ""
          echo "Working tree diff stat:"
          git diff --stat

      - name: Verify backdrops were not changed
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          if git status --short | grep 'home/dot_config/wezterm/backdrops/'; then
            echo "::error::backdrops files were changed, but they should be excluded"
            exit 1
          fi

          if git diff --name-only HEAD~20..HEAD | grep 'home/dot_config/wezterm/backdrops/'; then
            echo "::error::backdrops files were committed, but they should be excluded"
            exit 1
          fi

          echo "No backdrops changes detected."

      - name: Show final marker
        if: steps.base.outputs.sha != steps.upstream.outputs.sha
        run: |
          echo "Old marker: ${{ steps.base.outputs.sha }}"
          echo "New marker: $(cat .github/sync/wezterm-config-upstream-sha)"
